{% extends "base.html" %}
{% block title %}Import from DOI · LecturerHub{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-6">Import publication from DOI</h1>
<form method="post" class="bg-white dark:bg-slate-800 rounded-xl shadow-sm p-6 space-y-4 max-w-xl">
    {% csrf_token %}
    {{ form.as_p }}
    <p class="text-sm text-slate-500 dark:text-slate-400">
        Metadata is fetched from <a href="https://www.crossref.org/" target="_blank" class="text-blue-600 hover:underline">CrossRef</a>
        and used to prefill the publication form below.
    </p>
    <div class="flex gap-3">
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 text-sm font-medium">Fetch metadata</button>
        <a href="{% url 'publications:publication_list' %}" class="text-sm text-slate-500 self-center">Cancel</a>
    </div>
</form>
{% endblock %}
