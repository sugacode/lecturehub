{% extends "base.html" %}
{% block title %}Community Service · LecturerHub{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-6">{% if object %}Edit{% else %}Add{% endif %} community service</h1>
<form method="post" class="bg-white dark:bg-slate-800 rounded-xl shadow-sm p-6 space-y-4 max-w-xl">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="flex gap-3">
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 text-sm font-medium">Save</button>
        <a href="{% url 'service:community_service_list' %}" class="text-sm text-slate-500 self-center">Cancel</a>
    </div>
</form>
{% endblock %}
