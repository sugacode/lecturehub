<div class="grid grid-cols-1 md:grid-cols-6 gap-3">
    {% for day in days %}
    <div class="rounded-2xl shadow-sm ring-1 ring-zinc-900/5 dark:ring-white/10 p-3 {% if day.is_today %}bg-indigo-50/70 dark:bg-indigo-500/10{% else %}bg-white dark:bg-zinc-800{% endif %}">
        <div class="font-semibold text-sm mb-2">{{ day.label }} <span class="text-zinc-400 font-normal">{{ day.date }}</span></div>
        <div class="space-y-2">
            {% for item in day.items %}
            <div class="rounded-lg p-2 text-xs bg-indigo-50 dark:bg-indigo-500/10">
                <div class="font-medium">{{ item.start|time:"H:i" }}–{{ item.end|time:"H:i" }}</div>
                <div>{{ item.label }}</div>
                {% if item.sublabel %}<div class="text-zinc-500 dark:text-zinc-400">{{ item.sublabel }}</div>{% endif %}
            </div>
            {% empty %}
            <div class="text-xs text-zinc-400">No items</div>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>
