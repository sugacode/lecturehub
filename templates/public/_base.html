<!DOCTYPE html>
<html lang="en" x-data="{ darkMode: $cookie('dark_mode') === 'true' }"
      x-init="$watch('darkMode', v => $cookie('dark_mode', v))"
      :class="{ dark: darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LecturerHub{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
    <script>
        function getCookie(name) {
            const match = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
            return match ? match.pop() : '';
        }
        document.addEventListener('alpine:init', () => {
            Alpine.magic('cookie', () => (name, value) => {
                if (value === undefined) return getCookie(name);
                document.cookie = `${name}=${value};path=/;max-age=31536000`;
            });
        });
    </script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen antialiased">
    {% block content %}{% endblock %}
</body>
</html>
