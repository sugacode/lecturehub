<!DOCTYPE html>
<html lang="en" x-data :class="{ dark: $store.theme.dark }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LecturerHub{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
    <script>
        function getCookie(name) {
            const match = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
            return match ? match.pop() : '';
        }
        document.addEventListener('alpine:init', () => {
            // See templates/base.html for why this is a store rather than
            // x-data on <html>: it must stay reachable from nested x-data
            // scopes like the publication filters on the public CV page.
            Alpine.store('theme', { dark: getCookie('dark_mode') === 'true' });
            Alpine.effect(() => {
                document.cookie = `dark_mode=${Alpine.store('theme').dark};path=/;max-age=31536000`;
            });
        });
    </script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen antialiased flex flex-col">
    <div class="flex-1">
        {% block content %}{% endblock %}
    </div>
    {% include "_footer.html" %}
</body>
</html>
