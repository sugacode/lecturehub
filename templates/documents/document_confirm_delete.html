{% extends "base.html" %}
{% block title %}Delete document · LecturerHub{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-6">Delete document</h1>
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm p-6 max-w-xl">
    <p class="mb-4">Are you sure you want to delete "{{ object }}"? This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 hover:bg-red-700 text-white rounded-lg px-4 py-2 text-sm font-medium">Delete</button>
        <a href="{% url 'documents:document_list' %}" class="text-sm text-slate-500 ml-3">Cancel</a>
    </form>
</div>
{% endblock %}
